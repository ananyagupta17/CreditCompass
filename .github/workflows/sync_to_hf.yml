name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install huggingface_hub CLI
        run: pip install huggingface_hub[cli]

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload ananyagupta17/CreditCompass . . \
            --repo-type space \
            --token $HF_TOKEN \
            --exclude "venv/*" \
            --exclude "catboost_info/*" \
            --exclude "Notebooks/*" \
            --exclude "__pycache__/*" \
            --exclude ".git/*"
