<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CreditCompass — Loan Eligibility</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-slate-800 leading-none">CreditCompass</h1>
        <p class="text-xs text-slate-400">ML-powered loan eligibility</p>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-8">

    <div class="mb-6">
      <h2 class="text-2xl font-bold text-slate-800">Check Loan Eligibility</h2>
      <p class="text-slate-500 mt-1 text-sm">Fill in the details below. The model explains exactly why it approved or rejected your application.</p>
    </div>

    <form action="/predict" method="post" class="space-y-6">

      <!-- Section 1: Personal Details -->
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 bg-slate-50 border-b border-slate-200">
          <h3 class="text-sm font-semibold text-slate-600 uppercase tracking-wide">Personal Details</h3>
        </div>
        <div class="p-5 grid grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Gender</label>
            <select name="Gender" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Married</label>
            <select name="Married" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Dependents</label>
            <select name="Dependents" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              <option>0</option>
              <option>1</option>
              <option>2</option>
              <option>3+</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Education</label>
            <select name="Education" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              <option>Graduate</option>
              <option>Not Graduate</option>
            </select>
          </div>

          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Employment</label>
            <select name="Self_Employed" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              <option value="No">Salaried</option>
              <option value="Yes">Self-employed</option>
            </select>
          </div>

        </div>
      </div>

      <!-- Section 2: Financial Details -->
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 bg-slate-50 border-b border-slate-200">
          <h3 class="text-sm font-semibold text-slate-600 uppercase tracking-wide">Financial Details</h3>
        </div>
        <div class="p-5 grid grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Applicant Income <span class="text-slate-400 font-normal">(₹/month)</span></label>
            <input type="number" name="ApplicantIncome" placeholder="e.g. 5000"
              class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Co-applicant Income <span class="text-slate-400 font-normal">(₹/month)</span></label>
            <input type="number" name="CoapplicantIncome" placeholder="0 if none"
              class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" value="0">
          </div>

          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Credit History</label>
            <select name="Credit_History" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              <option value="1.0">Good — no defaults or missed payments</option>
              <option value="0.0">Poor — history of defaults</option>
            </select>
          </div>

        </div>
      </div>

      <!-- Section 3: Loan Details -->
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 bg-slate-50 border-b border-slate-200">
          <h3 class="text-sm font-semibold text-slate-600 uppercase tracking-wide">Loan Details</h3>
        </div>
        <div class="p-5 grid grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Loan Amount <span class="text-slate-400 font-normal">(₹)</span></label>
            <input type="number" name="LoanAmount" placeholder="e.g. 150000"
              class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Loan Term <span class="text-slate-400 font-normal">(months)</span></label>
            <select name="Loan_Amount_Term" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              <option value="360">360 — 30 years</option>
              <option value="180">180 — 15 years</option>
              <option value="240">240 — 20 years</option>
              <option value="120">120 — 10 years</option>
              <option value="60">60 — 5 years</option>
              <option value="84">84 — 7 years</option>
            </select>
          </div>

          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Property Area</label>
            <select name="Property_Area" class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              <option>Urban</option>
              <option>Semiurban</option>
              <option>Rural</option>
            </select>
          </div>

        </div>
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl shadow transition duration-200 text-sm">
        Check Eligibility
      </button>

    </form>
  </main>

</body>
</html>
